name: EV Data Refresh Reminder

on:
  schedule:
    - cron: '0 14 1 * *'    # 1st of every month, 10:00 AM ET (14:00 UTC)
    - cron: '0 14 15 * *'   # 15th of every month, 10:00 AM ET (14:00 UTC)
  workflow_dispatch: {}       # Manual trigger for testing

permissions:
  issues: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Create reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Data Refresh Reminder — ${date}`,
              body: [
                '## Time to refresh EV data',
                '',
                'Open Claude Code in the `ev-app` directory and run:',
                '',
                '```',
                '/project:refresh',
                '```',
                '',
                'This runs the 5-phase data refresh (pre-owned pricing, TBD resolution, spec corrections, new vehicle detection, gap filling) using your Claude Max subscription at no additional API cost.',
                '',
                '---',
                '*This issue auto-closes in 3 days. Created by [monthly-data-refresh.yml](../../.github/workflows/monthly-data-refresh.yml).*',
              ].join('\n'),
              labels: ['data-refresh'],
            });
            console.log(`Created issue #${issue.data.number}`);

      - name: Close stale reminder issues (older than 3 days)
        uses: actions/github-script@v7
        with:
          script: |
            const threeDaysAgo = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'data-refresh',
              state: 'open',
              per_page: 10,
            });
            for (const issue of issues.data) {
              if (issue.created_at < threeDaysAgo) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });
                console.log(`Closed stale issue #${issue.number}`);
              }
            }
