<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Data Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;800&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f1a;
      --bg-elevated: #171726;
      --bg-surface: #1e1e32;
      --border-subtle: rgba(255,255,255,0.06);
      --border-medium: rgba(255,255,255,0.12);
      --text-primary: #e8e8f0;
      --text-secondary: #9898b0;
      --text-muted: #6868808;
      --accent: #6b8afd;
      --font-serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      --font-sans: 'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    .content {
      padding: 3rem 2.5rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────── */

    .header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .header h1 {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .header .byline {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Controls ────────────────────────────────────────── */

    .controls-wrapper {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg-primary);
      padding: 1rem 0;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .controls-row + .controls-row {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-subtle);
    }

    .controls-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
      margin-right: 0.25rem;
      white-space: nowrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .control-group label {
      font-weight: 500;
      font-size: 0.78rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .control-group select {
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: var(--font-sans);
      transition: border-color 0.15s;
    }

    .control-group select:hover {
      border-color: var(--accent);
    }

    .control-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(107,138,253,0.15);
    }

    .dropdown {
      position: relative;
    }

    .dropdown-btn {
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: var(--font-sans);
      transition: border-color 0.15s;
    }

    .dropdown-btn:hover {
      border-color: var(--accent);
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 8px;
      padding: 10px;
      min-width: 260px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 20;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      margin-top: 4px;
    }

    .dropdown.open .dropdown-content {
      display: block;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 4px;
      cursor: pointer;
      font-size: 0.82rem;
      border-radius: 4px;
      transition: background 0.1s;
    }

    .checkbox-label:hover {
      background: rgba(255,255,255,0.04);
    }

    .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .select-all-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: var(--font-sans);
      padding: 4px 0;
      margin-bottom: 6px;
    }

    .select-all-btn:hover {
      text-decoration: underline;
    }

    /* ── Chart Area ──────────────────────────────────────── */

    .chart-area {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 2rem 2rem 1.5rem;
      margin-top: 1.5rem;
      border: 1px solid var(--border-subtle);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.25rem;
      padding: 1rem 0 0;
      margin-top: 0.75rem;
      border-top: 1px solid var(--border-subtle);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .chart-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-subtle);
      font-style: italic;
    }

    /* ── Observable Plot overrides ────────────────────────── */

    [aria-label="tip"] {
      color: #1a1a2e !important;
      font-size: 0.82rem;
      font-family: var(--font-sans) !important;
    }

    figure [aria-label="tip"] text {
      fill: #1a1a2e !important;
    }

    /* Make Plot SVG text use our fonts */
    figure text {
      font-family: var(--font-sans) !important;
    }
  </style>
  <script type="module">
    import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm";
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    // ── Constants ────────────────────────────────────────────────────────

    const VEHICLE_COLORS = {
      "Kia EV9":               "#4ade80",
      "Hyundai IONIQ 9":       "#5ba4f5",
      "Lucid Gravity":         "#a78bfa",
      "Rivian R1S":            "#fb923c",
      "Tesla Model X":         "#f87171",
      "Tesla Model Y (3-Row)": "#f87171",
      "Volkswagen ID. Buzz":   "#fbbf24",
      "VinFast VF9":           "#f59e0b",
      "Volvo EX90":            "#f472b6",
      "Cadillac Escalade IQ":  "#a78bfa",
      "Cadillac VISTIQ":       "#c084fc",
      "Mercedes-Benz EQS SUV": "#d4d4d8",
    };

    const WATCHLIST = [
      "Subaru 3-Row EV",
      "BMW iX7",
      "Genesis GV90",
      "Toyota Highlander EV",
      "Tesla Model Y Long (Asia)",
    ];

    const SELF_DRIVING_TIERS = {
      "Basic L2":           2.1,
      "Advanced L2":        2.2,
      "L2+ Hands-Free":     2.3,
      "L2+ Point-to-Point": 2.4,
    };

    const NUMERIC_FIELDS = [
      "msrp", "otd_new", "range_mi", "hp", "battery_kwh", "towing_lbs",
      "dc_fast_charge_kw", "dc_fast_charge_10_80_min", "curb_weight_lbs",
      "length_in", "width_in", "height_in", "third_row_legroom_in",
      "third_row_headroom_in", "torque_lb_ft", "zero_to_60_sec",
      "ground_clearance_in", "cargo_behind_3rd_cu_ft", "cargo_behind_2nd_cu_ft",
      "cargo_behind_1st_cu_ft", "cargo_floor_width_in", "frunk_cu_ft",
      "onboard_ac_kw", "l2_10_100", "l2_10_80", "destination",
    ];

    // Human-readable labels for each plottable field
    const FIELD_LABELS = {
      msrp:                      "MSRP ($)",
      otd_new:                   "OTD New Price ($)",
      range_mi:                  "Range (miles)",
      hp:                        "Horsepower",
      battery_kwh:               "Battery (kWh)",
      towing_lbs:                "Towing Capacity (lbs)",
      dc_fast_charge_kw:         "DC Fast Charge (kW)",
      dc_fast_charge_10_80_min:  "DC Charge 10–80% (min)",
      curb_weight_lbs:           "Curb Weight (lbs)",
      length_in:                 "Length (in)",
      width_in:                  "Width (in)",
      height_in:                 "Height (in)",
      third_row_legroom_in:      "3rd Row Legroom (in)",
      third_row_headroom_in:     "3rd Row Headroom (in)",
      torque_lb_ft:              "Torque (lb-ft)",
      zero_to_60_sec:            "0–60 mph (sec)",
      ground_clearance_in:       "Ground Clearance (in)",
      cargo_behind_3rd_cu_ft:    "Cargo Behind 3rd Row (cu ft)",
      cargo_behind_2nd_cu_ft:    "Cargo Behind 2nd Row (cu ft)",
      cargo_behind_1st_cu_ft:    "Cargo Behind 1st Row (cu ft)",
      cargo_floor_width_in:      "Cargo Floor Width (in)",
      frunk_cu_ft:               "Frunk (cu ft)",
      onboard_ac_kw:             "Onboard AC Charger (kW)",
      l2_10_100:                 "L2 Charge 10–100% (hrs)",
      l2_10_80:                  "L2 Charge 10–80% (hrs)",
      destination:               "Destination Charge ($)",
      self_driving_score:        "Self-Driving Tier",
    };

    // Whether higher values are "better" (1), "worse" (-1), or neutral (0)
    const FIELD_DIRECTION = {
      msrp:                      -1, // lower price = better
      otd_new:                   -1,
      range_mi:                   1, // more range = better
      hp:                         1,
      battery_kwh:                1,
      towing_lbs:                 1,
      dc_fast_charge_kw:          1, // faster charging = better
      dc_fast_charge_10_80_min:  -1, // less time = better
      curb_weight_lbs:           -1, // lighter = better (efficiency)
      length_in:                  0, // neutral — preference-dependent
      width_in:                   0,
      height_in:                  0,
      third_row_legroom_in:       1,
      third_row_headroom_in:      1,
      torque_lb_ft:               1,
      zero_to_60_sec:            -1, // faster = better
      ground_clearance_in:        1,
      cargo_behind_3rd_cu_ft:     1,
      cargo_behind_2nd_cu_ft:     1,
      cargo_behind_1st_cu_ft:     1,
      cargo_floor_width_in:       1,
      frunk_cu_ft:                1,
      onboard_ac_kw:              1,
      l2_10_100:                 -1, // less time = better
      l2_10_80:                  -1,
      destination:               -1,
      self_driving_score:         1,
    };

    // Quadrant label logic: given direction of X and Y, label each quadrant
    // Returns { topLeft, topRight, bottomLeft, bottomRight } or null if both neutral
    function getQuadrantLabels(xField, yField) {
      const xDir = FIELD_DIRECTION[xField] ?? 0;
      const yDir = FIELD_DIRECTION[yField] ?? 0;
      if (xDir === 0 && yDir === 0) return null;

      // Determine what "high" means for each axis
      const xHighGood = xDir === 1;
      const xHighBad  = xDir === -1;
      const yHighGood = yDir === 1;
      const yHighBad  = yDir === -1;

      // Score each quadrant: +1 for each "good" dimension, -1 for each "bad"
      function score(xHigh, yHigh) {
        let s = 0;
        if (xDir !== 0) s += (xHigh ? xHighGood : xHighBad) ? 1 : -1;
        if (yDir !== 0) s += (yHigh ? yHighGood : yHighBad) ? 1 : -1;
        return s;
      }

      function label(s, xHigh, yHigh) {
        if (s === 2)  return "Best Value";
        if (s === -2) return "Worst Value";
        // Mixed: one good, one bad — describe the tradeoff
        if (s === 0 && xDir !== 0 && yDir !== 0) {
          // Figure out which dimension is good
          const xGood = (xHigh && xHighGood) || (!xHigh && xHighBad);
          if (xGood) return "Good " + shortName(xField) + ",\nWeak " + shortName(yField);
          else return "Good " + shortName(yField) + ",\nWeak " + shortName(xField);
        }
        // One axis is neutral
        if (xDir === 0) return yHigh ? (yHighGood ? "Strong" : "Weak") : (yHighBad ? "Weak" : "Strong");
        if (yDir === 0) return xHigh ? (xHighGood ? "Strong" : "Weak") : (xHighBad ? "Weak" : "Strong");
        return "";
      }

      const tl = score(false, true);
      const tr = score(true, true);
      const bl = score(false, false);
      const br = score(true, false);

      return {
        topLeft:     label(tl, false, true),
        topRight:    label(tr, true, true),
        bottomLeft:  label(bl, false, false),
        bottomRight: label(br, true, false),
      };
    }

    // Short field name for tradeoff labels
    function shortName(field) {
      const shorts = {
        msrp: "Price", otd_new: "Price", range_mi: "Range", hp: "Power",
        battery_kwh: "Battery", towing_lbs: "Towing", dc_fast_charge_kw: "Charge Speed",
        dc_fast_charge_10_80_min: "Charge Time", curb_weight_lbs: "Weight",
        third_row_legroom_in: "Legroom", third_row_headroom_in: "Headroom",
        torque_lb_ft: "Torque", zero_to_60_sec: "Acceleration",
        ground_clearance_in: "Clearance", cargo_behind_3rd_cu_ft: "Cargo",
        cargo_behind_2nd_cu_ft: "Cargo", cargo_behind_1st_cu_ft: "Cargo",
        cargo_floor_width_in: "Cargo Width", frunk_cu_ft: "Frunk",
        onboard_ac_kw: "AC Charger", l2_10_100: "L2 Time", l2_10_80: "L2 Time",
        destination: "Dest. Fee", self_driving_score: "Self-Driving",
        length_in: "Length", width_in: "Width", height_in: "Height",
      };
      return shorts[field] || FIELD_LABELS[field];
    }

    // Fields worth plotting (exclude destination, include self_driving_score)
    const PLOTTABLE_FIELDS = [
      "msrp", "otd_new", "range_mi", "hp", "torque_lb_ft", "zero_to_60_sec",
      "self_driving_score",
      "battery_kwh", "towing_lbs",
      "dc_fast_charge_kw", "dc_fast_charge_10_80_min",
      "third_row_legroom_in", "third_row_headroom_in",
      "cargo_behind_3rd_cu_ft", "cargo_behind_2nd_cu_ft", "cargo_behind_1st_cu_ft",
      "cargo_floor_width_in", "frunk_cu_ft",
    ];

    // ── Data Loading ─────────────────────────────────────────────────────

    async function loadData() {
      const res = await fetch("lib/ev-data.json");
      if (!res.ok) throw new Error(`Failed to load data: ${res.status}`);
      const raw = await res.json();
      const details = raw.details
        .filter(d => !WATCHLIST.includes(d.vehicle))
        .map(d => {
          const row = { ...d };
          for (const f of NUMERIC_FIELDS) {
            const v = Number(row[f]);
            row[f] = Number.isNaN(v) ? null : v;
          }
          row.self_driving_score = SELF_DRIVING_TIERS[row.self_driving_tier] ?? null;
          return row;
        });
      return details;
    }

    // ── Filters ──────────────────────────────────────────────────────────

    function buildFilters(data) {
      const vehicles = [...new Set(data.map(d => d.vehicle))].sort();
      const years = [...new Set(data.map(d => d.year))].sort();
      const filtersEl = document.getElementById("filters");

      // Vehicle multi-select
      const vehicleDiv = document.createElement("div");
      vehicleDiv.className = "control-group";
      vehicleDiv.innerHTML = `
        <label>Vehicles</label>
        <div class="dropdown">
          <button class="dropdown-btn" id="vehicle-btn">All Vehicles ▼</button>
          <div class="dropdown-content" id="vehicle-dropdown">
            <button class="select-all-btn" id="vehicle-select-all">Select All</button>
            ${vehicles.map(v => `
              <label class="checkbox-label">
                <input type="checkbox" value="${v}" checked>
                <span class="color-dot" style="background:${VEHICLE_COLORS[v] || '#888'}"></span>
                ${v}
              </label>
            `).join("")}
          </div>
        </div>
      `;
      filtersEl.appendChild(vehicleDiv);

      // Year multi-select
      const yearDiv = document.createElement("div");
      yearDiv.className = "control-group";
      yearDiv.innerHTML = `
        <label>Years</label>
        <div class="dropdown">
          <button class="dropdown-btn" id="year-btn">All Years ▼</button>
          <div class="dropdown-content" id="year-dropdown">
            <button class="select-all-btn" id="year-select-all">Select All</button>
            ${years.map(y => `
              <label class="checkbox-label">
                <input type="checkbox" value="${y}" checked>
                ${y}
              </label>
            `).join("")}
          </div>
        </div>
      `;
      filtersEl.appendChild(yearDiv);

      // Seats filter
      const seatsDiv = document.createElement("div");
      seatsDiv.className = "control-group";
      seatsDiv.innerHTML = `
        <label>Seats</label>
        <select id="seats-select">
          <option value="all">All</option>
          <option value="6">6</option>
          <option value="7">7</option>
        </select>
      `;
      filtersEl.appendChild(seatsDiv);

      // Drivetrain filter
      const dtDiv = document.createElement("div");
      dtDiv.className = "control-group";
      dtDiv.innerHTML = `
        <label>Drivetrain</label>
        <select id="drivetrain-select">
          <option value="all">All</option>
          <option value="AWD">AWD</option>
          <option value="RWD">RWD</option>
        </select>
      `;
      filtersEl.appendChild(dtDiv);

      // Range multi-select filter
      const rangeBuckets = ["200–250 mi", "250–300 mi", "300–325 mi", "325–350 mi", "350–400 mi", "400+ mi"];
      const rangeDiv = document.createElement("div");
      rangeDiv.className = "control-group";
      rangeDiv.innerHTML = `
        <label>Range</label>
        <div class="dropdown">
          <button class="dropdown-btn" id="range-btn">All Ranges ▼</button>
          <div class="dropdown-content" id="range-dropdown">
            <button class="select-all-btn" id="range-select-all">Select All</button>
            ${rangeBuckets.map(r => `
              <label class="checkbox-label">
                <input type="checkbox" value="${r}" checked>
                ${r}
              </label>
            `).join("")}
          </div>
        </div>
      `;
      filtersEl.appendChild(rangeDiv);
    }

    function getFilteredData(data) {
      const vehicleBoxes = document.querySelectorAll("#vehicle-dropdown input[type=checkbox]");
      const selectedVehicles = new Set([...vehicleBoxes].filter(c => c.checked).map(c => c.value));
      const yearBoxes = document.querySelectorAll("#year-dropdown input[type=checkbox]");
      const selectedYears = new Set([...yearBoxes].filter(c => c.checked).map(c => Number(c.value)));
      const seatsVal = document.getElementById("seats-select").value;
      const dtVal = document.getElementById("drivetrain-select").value;
      const rangeBoxes = document.querySelectorAll("#range-dropdown input[type=checkbox]");
      const selectedRanges = new Set([...rangeBoxes].filter(c => c.checked).map(c => c.value));

      return data.filter(d => {
        if (!selectedVehicles.has(d.vehicle)) return false;
        if (!selectedYears.has(d.year)) return false;
        if (seatsVal !== "all" && d.seats !== Number(seatsVal)) return false;
        if (dtVal !== "all" && d.drivetrain !== dtVal) return false;
        // Range bucket filter
        const r = d.range_mi;
        if (r == null) return selectedRanges.size === rangeBoxes.length; // show null range only if "all" selected
        let inBucket = false;
        if (r >= 200 && r < 250 && selectedRanges.has("200–250 mi")) inBucket = true;
        if (r >= 250 && r < 300 && selectedRanges.has("250–300 mi")) inBucket = true;
        if (r >= 300 && r < 325 && selectedRanges.has("300–325 mi")) inBucket = true;
        if (r >= 325 && r < 350 && selectedRanges.has("325–350 mi")) inBucket = true;
        if (r >= 350 && r < 400 && selectedRanges.has("350–400 mi")) inBucket = true;
        if (r >= 400 && selectedRanges.has("400+ mi")) inBucket = true;
        if (!inBucket) return false;
        return true;
      });
    }

    function wireDropdown(btnId, dropdownId, selectAllId, updateLabel, data, render) {
      const btn = document.getElementById(btnId);
      const dropdown = btn.closest(".dropdown");
      btn.addEventListener("click", () => dropdown.classList.toggle("open"));
      document.addEventListener("click", (e) => {
        if (!dropdown.contains(e.target)) dropdown.classList.remove("open");
      });

      document.getElementById(selectAllId).addEventListener("click", () => {
        const boxes = document.querySelectorAll(`#${dropdownId} input[type=checkbox]`);
        const allChecked = [...boxes].every(c => c.checked);
        boxes.forEach(c => c.checked = !allChecked);
        updateLabel();
        render();
      });

      document.querySelectorAll(`#${dropdownId} input[type=checkbox]`).forEach(cb => {
        cb.addEventListener("change", () => { updateLabel(); render(); });
      });
    }

    function updateVehicleButtonLabel() {
      const boxes = document.querySelectorAll("#vehicle-dropdown input[type=checkbox]");
      const checked = [...boxes].filter(c => c.checked);
      const btn = document.getElementById("vehicle-btn");
      if (checked.length === boxes.length) btn.textContent = "All Vehicles ▼";
      else if (checked.length === 0) btn.textContent = "None Selected ▼";
      else if (checked.length <= 2) btn.textContent = checked.map(c => c.value.split(" ")[0]).join(", ") + " ▼";
      else btn.textContent = `${checked.length} Vehicles ▼`;
    }

    function updateYearButtonLabel() {
      const boxes = document.querySelectorAll("#year-dropdown input[type=checkbox]");
      const checked = [...boxes].filter(c => c.checked);
      const btn = document.getElementById("year-btn");
      if (checked.length === boxes.length) btn.textContent = "All Years ▼";
      else if (checked.length === 0) btn.textContent = "No Years ▼";
      else btn.textContent = checked.map(c => c.value).join(", ") + " ▼";
    }

    function updateRangeButtonLabel() {
      const boxes = document.querySelectorAll("#range-dropdown input[type=checkbox]");
      const checked = [...boxes].filter(c => c.checked);
      const btn = document.getElementById("range-btn");
      if (checked.length === boxes.length) btn.textContent = "All Ranges ▼";
      else if (checked.length === 0) btn.textContent = "No Range ▼";
      else if (checked.length === 1) btn.textContent = checked[0].value + " ▼";
      else btn.textContent = `${checked.length} Ranges ▼`;
    }

    // ── Axis Selectors ───────────────────────────────────────────────────

    function buildAxisSelectors() {
      const axisEl = document.getElementById("axis-selectors");

      function makeSelect(id, label, defaultVal, includeNone) {
        const group = document.createElement("div");
        group.className = "control-group";
        let options = PLOTTABLE_FIELDS.map(f =>
          `<option value="${f}" ${f === defaultVal ? "selected" : ""}>${FIELD_LABELS[f]}</option>`
        ).join("");
        if (includeNone) {
          options = `<option value="none" ${defaultVal === "none" ? "selected" : ""}>None (fixed size)</option>` + options;
        }
        group.innerHTML = `<label>${label}</label><select id="${id}">${options}</select>`;
        axisEl.appendChild(group);
      }

      makeSelect("x-axis", "X-Axis", "msrp", false);
      makeSelect("y-axis", "Y-Axis", "range_mi", false);
      makeSelect("bubble-size", "Bubble Size", "none", true);
    }

    // ── Chart Rendering ──────────────────────────────────────────────────

    function renderChart(data) {
      const container = document.getElementById("chart-container");
      container.innerHTML = "";

      const xField = document.getElementById("x-axis").value;
      const yField = document.getElementById("y-axis").value;
      const sizeField = document.getElementById("bubble-size").value;

      const filtered = data.filter(d => d[xField] != null && d[yField] != null);

      if (filtered.length === 0) {
        container.innerHTML = '<p style="color:#8888aa;text-align:center;padding:3rem;">No data for this combination.</p>';
        return;
      }

      const vehicles = [...new Set(filtered.map(d => d.vehicle))].sort();

      const isCurrency = (f) => ["msrp", "otd_new", "destination"].includes(f);
      const xFormat = isCurrency(xField) ? d3.format("$,.0f") : undefined;
      const yFormat = isCurrency(yField) ? d3.format("$,.0f") : undefined;

      // Special axis handling for self-driving tier
      const tierLabels = Object.entries(SELF_DRIVING_TIERS);
      const TIER_SHORT = { "Basic L2": "Basic L2", "Advanced L2": "Adv. L2", "L2+ Hands-Free": "L2+ HF", "L2+ Point-to-Point": "L2+ P2P" };
      const yConfig = yField === "self_driving_score"
        ? {
            label: FIELD_LABELS[yField],
            domain: [2.0, 2.5],
            ticks: tierLabels.map(([, v]) => v),
            tickFormat: v => { const t = tierLabels.find(([, n]) => n === v); return t ? TIER_SHORT[t[0]] : ""; },
          }
        : { label: FIELD_LABELS[yField], tickFormat: yFormat };

      const xConfig = xField === "self_driving_score"
        ? {
            label: FIELD_LABELS[xField],
            domain: [2.0, 2.5],
            ticks: tierLabels.map(([, v]) => v),
            tickFormat: v => { const t = tierLabels.find(([, n]) => n === v); return t ? TIER_SHORT[t[0]] : ""; },
          }
        : { label: FIELD_LABELS[xField], tickFormat: xFormat };

      const plotConfig = {
        width: container.clientWidth || 900,
        height: 560,
        marginTop: 20,
        marginRight: 20,
        marginBottom: 45,
        marginLeft: 60,
        style: { background: "transparent", color: "#9898b0", fontSize: "12px" },
        grid: true,
        x: xConfig,
        y: yConfig,
        color: {
          domain: vehicles,
          range: vehicles.map(v => VEHICLE_COLORS[v] || "#888"),
        },
        marks: [],
      };

      // Build dot mark options
      const dotOpts = {
        x: xField,
        y: yField,
        fill: "vehicle",
        fillOpacity: 0.8,
        stroke: "#171726",
        strokeWidth: 1,
        tip: true,
      };

      // Bubble size
      if (sizeField !== "none") {
        const sizeData = filtered.filter(d => d[sizeField] != null);
        dotOpts.r = sizeField;
        plotConfig.r = { domain: d3.extent(sizeData, d => d[sizeField]), range: [4, 20] };
        dotOpts.title = d => {
          let t = `${d.name}\n${FIELD_LABELS[xField]}: ${isCurrency(xField) ? "$" + d3.format(",")(d[xField]) : d[xField]}`;
          t += `\n${FIELD_LABELS[yField]}: ${isCurrency(yField) ? "$" + d3.format(",")(d[yField]) : d[yField]}`;
          if (d[sizeField] != null) t += `\n${FIELD_LABELS[sizeField]}: ${d[sizeField]}`;
          return t;
        };
      } else {
        dotOpts.r = 6;
        dotOpts.title = d => {
          let t = `${d.name}\n${FIELD_LABELS[xField]}: ${isCurrency(xField) ? "$" + d3.format(",")(d[xField]) : d[xField]}`;
          t += `\n${FIELD_LABELS[yField]}: ${isCurrency(yField) ? "$" + d3.format(",")(d[yField]) : d[yField]}`;
          return t;
        };
      }

      // Quadrant lines and labels
      const xMedian = d3.median(filtered, d => d[xField]);
      const yMedian = d3.median(filtered, d => d[yField]);

      if (xMedian != null && yMedian != null) {
        // Median crosshair lines
        plotConfig.marks.push(
          Plot.ruleX([xMedian], { stroke: "rgba(255,255,255,0.12)", strokeWidth: 1, strokeDasharray: "6,4" }),
          Plot.ruleY([yMedian], { stroke: "rgba(255,255,255,0.12)", strokeWidth: 1, strokeDasharray: "6,4" }),
        );

        // Quadrant labels
        const labels = getQuadrantLabels(xField, yField);
        if (labels) {
          // Position labels near the median crosshair, inside each quadrant
          const xMin = d3.min(filtered, d => d[xField]);
          const xMax = d3.max(filtered, d => d[xField]);
          const yMin = d3.min(filtered, d => d[yField]);
          const yMax = d3.max(filtered, d => d[yField]);
          const xLow  = xMedian - (xMedian - xMin) * 0.5;
          const xHigh = xMedian + (xMax - xMedian) * 0.5;
          const yLow  = yMedian - (yMedian - yMin) * 0.5;
          const yHigh = yMedian + (yMax - yMedian) * 0.5;

          const quadrants = [
            { x: xLow,  y: yHigh, text: labels.topLeft,     textAnchor: "middle" },
            { x: xHigh, y: yHigh, text: labels.topRight,    textAnchor: "middle" },
            { x: xLow,  y: yLow,  text: labels.bottomLeft,  textAnchor: "middle" },
            { x: xHigh, y: yLow,  text: labels.bottomRight, textAnchor: "middle" },
          ].filter(q => q.text);

          plotConfig.marks.push(
            Plot.text(quadrants, {
              x: "x", y: "y", text: "text", textAnchor: "middle",
              fill: "rgba(255,255,255,0.18)", fontStyle: "italic", fontSize: 13, lineAnchor: "middle",
            })
          );
        }
      }

      plotConfig.marks.push(Plot.dot(filtered, dotOpts));

      const plot = Plot.plot(plotConfig);
      container.appendChild(plot);
    }

    function renderLegend(data) {
      let legend = document.getElementById("legend");
      if (!legend) {
        legend = document.createElement("div");
        legend.id = "legend";
        legend.className = "legend";
        // Insert after chart-container, before the note
        const note = document.querySelector(".chart-note");
        document.getElementById("chart-area").insertBefore(legend, note);
      }
      const vehicles = [...new Set(data.map(d => d.vehicle))].sort();
      legend.innerHTML = vehicles.map(v =>
        `<span class="legend-item"><span class="color-dot" style="background:${VEHICLE_COLORS[v] || '#888'}"></span>${v}</span>`
      ).join("");
    }

    // ── Main ─────────────────────────────────────────────────────────────

    async function main() {
      document.getElementById("chart-container").innerHTML =
        '<p style="color:var(--text-muted);text-align:center;padding:4rem;font-family:var(--font-serif);font-size:1.1rem;">Loading data...</p>';

      const data = await loadData();
      buildFilters(data);
      buildAxisSelectors();

      function render() {
        const filtered = getFilteredData(data);
        renderLegend(filtered);
        renderChart(filtered);
      }

      // Wire filter dropdowns
      wireDropdown("vehicle-btn", "vehicle-dropdown", "vehicle-select-all", updateVehicleButtonLabel, data, render);
      wireDropdown("year-btn", "year-dropdown", "year-select-all", updateYearButtonLabel, data, render);
      wireDropdown("range-btn", "range-dropdown", "range-select-all", updateRangeButtonLabel, data, render);

      // Wire seats and drivetrain filters
      document.getElementById("seats-select").addEventListener("change", render);
      document.getElementById("drivetrain-select").addEventListener("change", render);

      // Wire axis selectors
      document.getElementById("x-axis").addEventListener("change", render);
      document.getElementById("y-axis").addEventListener("change", render);
      document.getElementById("bubble-size").addEventListener("change", render);

      render();
    }

    main().catch(err => {
      console.error(err);
      document.querySelector(".content").innerHTML =
        `<p style="color:#f87171;padding:2rem;">Error loading data: ${err.message}</p>`;
    });
  </script>
</head>
<body>
  <main class="content">
    <div class="header">
      <h1>3-Row Electric Vehicle Explorer</h1>
      <p class="byline">Data updated March 2026</p>
    </div>
    <div class="controls-wrapper">
      <div class="controls-row" id="filters">
        <span class="controls-label">Filter</span>
        <!-- vehicle/year filters injected by JS -->
      </div>
      <div class="controls-row" id="axis-selectors">
        <span class="controls-label">Plot</span>
        <!-- X, Y, Bubble size selectors injected by JS -->
      </div>
    </div>
    <div class="chart-area" id="chart-area">
      <div id="chart-container"></div>
      <p class="chart-note">Dashed lines show the median. Quadrant labels indicate relative value based on whether higher or lower is better for each metric.</p>
    </div>
  </main>
</body>
</html>
